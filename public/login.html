<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вхід · wa-scheduler</title>
    <style>
        :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f1115; color: #e9edf2; }
        * { box-sizing: border-box; }
        body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: #0f1115; padding: 20px; }
        main { width: min(380px, 100%); background: #161a20; border: 1px solid #282e38; border-radius: 10px; padding: 24px; }
        h1 { font-size: 22px; margin: 0 0 5px; }
        p { margin: 0 0 20px; color: #8e98a8; font-size: 13px; }
        label { display: grid; gap: 7px; color: #aeb8c6; font-size: 13px; }
        input { width: 100%; border: 1px solid #343a45; border-radius: 7px; background: #101319; color: #edf1f6; padding: 10px; font: inherit; }
        button { width: 100%; margin-top: 14px; border: 1px solid #19a463; background: #19a463; color: white; border-radius: 7px; padding: 9px 12px; cursor: pointer; font: inherit; }
        .error { min-height: 18px; margin: 10px 0 0; color: #ff8d95; font-size: 12px; }
    </style>
</head>
<body>
    <main>
        <h1>wa-scheduler</h1>
        <p>Введіть пароль для доступу до вебінтерфейсу.</p>
        <form id="login-form">
            <label>Пароль<input id="password" type="password" autocomplete="current-password" autofocus required></label>
            <p id="login-error" class="error"></p>
            <button type="submit">Увійти</button>
        </form>
    </main>
    <script>
        document.querySelector('#login-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            const button = event.target.querySelector('button');
            const error = document.querySelector('#login-error');
            button.disabled = true;
            error.textContent = '';
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: document.querySelector('#password').value })
                });
                const data = await response.json().catch(() => ({}));
                if (!response.ok) throw new Error(data.error || 'Не вдалося увійти');
                location.replace('/');
            } catch (failure) {
                error.textContent = failure.message;
            } finally {
                button.disabled = false;
            }
        });
    </script>
</body>
</html>
